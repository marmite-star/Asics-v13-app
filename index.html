
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASICS V17</title>
<style>
body{
  font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
  background:#0b0f14;
  color:#e6edf3;
  margin:0;
  padding:40px;
}
.container{
  max-width:900px;
  margin:auto;
}
.card{
  background:#131920;
  padding:24px;
  border-radius:12px;
  margin-bottom:20px;
}
button{
  background:#2563eb;
  border:none;
  padding:12px 20px;
  border-radius:8px;
  color:white;
  cursor:pointer;
}
input{
  margin-top:10px;
}
pre{
  background:#0f141a;
  padding:16px;
  border-radius:8px;
  overflow:auto;
}
</style>
</head>

<body>

<div class="container">

<h1>ASICS V17</h1>
<p>Import RUN → Import RESULT → affichage.</p>

<div class="card">
<h2>1️⃣ Import RUN</h2>
<input type="file" id="runFile">
</div>

<div class="card">
<h2>2️⃣ Import RESULT</h2>
<input type="file" id="resultFile">
</div>

<div class="card">
<h2>3️⃣ Analyse</h2>
<pre id="output">Aucune donnée</pre>
</div>

</div>

<script>

let runData = null
let resultData = null

document.getElementById("runFile").addEventListener("change", async (e)=>{

  const file = e.target.files[0]
  const text = await file.text()
  runData = JSON.parse(text)

  render()

})

document.getElementById("resultFile").addEventListener("change", async (e)=>{

  const file = e.target.files[0]
  const text = await file.text()
  resultData = JSON.parse(text)

  render()

})

function render(){

  const out = document.getElementById("output")

  if(!runData){
    out.textContent = "RUN manquant"
    return
  }

  if(!resultData){
    out.textContent = "RUN chargé. En attente du RESULT."
    return
  }

  const view = {
    run: runData,
    analysis: resultData.analysis || null
  }

  out.textContent = JSON.stringify(view,null,2)

}

</script>

</body>
</html>
