<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASICS V13</title>
<style>
body{font-family:Arial,Helvetica,sans-serif;background:#0b0f14;color:#e8eef6;margin:0;padding:20px}
.card{background:#131920;padding:20px;border-radius:10px;margin-bottom:20px}
button{padding:10px 16px;border:none;border-radius:6px;background:#2d7ef7;color:white;font-weight:bold}
input[type=file]{margin-top:10px}
#fire{font-size:28px;font-weight:bold;margin-top:10px}
.green{color:#00d26a}
.orange{color:#ff9f1a}
.red{color:#ff4d4f}
.small{opacity:.7;font-size:14px}
</style>
</head>
<body>

<h1>ASICS V13</h1>

<div class="card">
<h3>1. Export RUN</h3>
<button onclick="exportRun()">Exporter RUN</button>
<div class="small">Le RUN doit être envoyé à GPT pour analyse.</div>
</div>

<div class="card">
<h3>2. Import résultat GPT</h3>
<input type="file" id="resultFile" accept=".json">
<button onclick="importResult()">Importer</button>

<div id="result" style="display:none;margin-top:20px">
<div id="fire"></div>
<p id="lecture"></p>
<p><b>Geste du jour :</b> <span id="geste"></span></p>
</div>
</div>

<script>

let state = {
 runId: null
};

function generateRunId(){
 const d = new Date();
 return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+
 String(d.getDate()).padStart(2,"0")+"_"+
 String(d.getHours()).padStart(2,"0")+"-"+
 String(d.getMinutes()).padStart(2,"0")+"-"+
 String(d.getSeconds()).padStart(2,"0");
}

function exportRun(){

 const runId = generateRunId();
 state.runId = runId;

 const run = {
  type:"asics_run",
  run_id:runId,
  import_contract:{
   expected_run_id:runId
  },
  timestamp:new Date().toISOString()
 };

 const blob = new Blob([JSON.stringify(run,null,2)],{type:"application/json"});
 const url = URL.createObjectURL(blob);

 const a=document.createElement("a");
 a.href=url;
 a.download="asics_run_"+runId+".json";
 a.click();
}

function importResult(){

 const file=document.getElementById("resultFile").files[0];
 if(!file) return alert("Sélectionne le fichier résultat");

 const reader=new FileReader();

 reader.onload=function(){

  const parsed=JSON.parse(reader.result);

  if(parsed.run_id!==state.runId){
   alert("Import impossible — run_id non correspondant. Attendu : "+state.runId);
   return;
  }

  const fire=parsed.analysis.feu_de_synthese;

  const fireEl=document.getElementById("fire");
  fireEl.className="";

  if(fire==="VERT"){fireEl.classList.add("green");fireEl.innerText="🟢 AVANCE";}
  if(fire==="ORANGE"){fireEl.classList.add("orange");fireEl.innerText="🟠 RALENTIS";}
  if(fire==="ROUGE"){fireEl.classList.add("red");fireEl.innerText="🔴 STOP";}

  document.getElementById("lecture").innerText=parsed.analysis.lecture_courte || "";
  document.getElementById("geste").innerText=parsed.analysis.geste_du_jour || "";

  document.getElementById("result").style.display="block";

 };

 reader.readAsText(file);

}

</script>

</body>
</html>
