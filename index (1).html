<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0f14" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>ASICS V13</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0b0f14;
      --card: #131920;
      --card2: #1a2230;
      --text: #f0f4fa;
      --muted: #8a9ab0;
      --border: #252f3d;
      --accent: #5b9aff;
      --green: #2ecc71;
      --orange: #f5a623;
      --red: #ff4d6d;
      --radius: 16px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }
    body { padding-bottom: 82px; }
    input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
    input[type=number] { -moz-appearance: textfield; }
    ::-webkit-scrollbar { display: none; }

    .app { max-width: 430px; margin: 0 auto; padding: 0 0 24px; }
    .hdr {
      padding: 28px 20px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      position: sticky;
      top: 0;
      background: rgba(11,15,20,.96);
      backdrop-filter: blur(8px);
      z-index: 20;
    }
    .hdr-t { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; letter-spacing: -.5px; }
    .hdr-v { font-size: 9px; color: var(--muted); letter-spacing: 3px; }
    .hdr-d { margin-left: auto; font-size: 10px; color: var(--muted); }
    .mode-badge {
      margin-left: 6px;
      font-size: 8px;
      letter-spacing: 2px;
      padding: 5px 8px;
      border-radius: 999px;
      border: 1px solid var(--border);
      color: var(--muted);
    }
    .mode-export { color: var(--accent); border-color: rgba(91,154,255,.3); background: rgba(91,154,255,.08); }

    .qscreen { padding: 28px 20px 0; min-height: 320px; }
    .qlabel { font-size: 9px; letter-spacing: 3px; color: var(--muted); text-transform: uppercase; margin-bottom: 16px; }
    .qtitle { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; line-height: 1.4; margin-bottom: 24px; }
    .qhint { font-size: 11px; color: var(--muted); margin-top: 12px; line-height: 1.5; }

    .btn-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn-choice {
      flex: 1;
      min-width: 80px;
      padding: 14px 10px;
      background: #111822;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      border-radius: 10px;
      cursor: pointer;
      text-align: center;
      line-height: 1.3;
      transition: all .12s;
    }
    .btn-choice.sel { background: #1a2a1a; border-color: var(--green); color: var(--green); }
    .btn-choice.sel-o { background: #1a1500; border-color: var(--orange); color: var(--orange); }
    .btn-choice.sel-r { background: #1a0010; border-color: var(--red); color: var(--red); }

    .scale-row { display: flex; gap: 8px; }
    .scale-btn {
      flex: 1;
      padding: 16px 4px;
      background: #111822;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
      font-size: 16px;
      border-radius: 10px;
      cursor: pointer;
      text-align: center;
      transition: all .12s;
    }
    .scale-btn.sel { background: #1a1a2a; border-color: var(--accent); color: var(--text); }

    .cb-list { display: flex; flex-direction: column; gap: 8px; }
    .cb-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px;
      background: #111822;
      border: 1px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      transition: all .12s;
    }
    .cb-item.sel { background: #0d1a0d; border-color: rgba(46,204,113,.3); }
    .cb-mark {
      width: 16px;
      height: 16px;
      border: 1px solid #2a3542;
      border-radius: 3px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      color: transparent;
    }
    .cb-item.sel .cb-mark { border-color: var(--green); color: var(--green); background: rgba(46,204,113,.1); }
    .cb-label { font-size: 13px; }

    .num-inp, .txt-inp, .cfg-inp {
      width: 100%;
      background: #111822;
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      border-radius: 10px;
      outline: none;
    }
    .num-inp { font-size: 32px; padding: 14px 16px; letter-spacing: 1px; }
    .txt-inp { font-size: 14px; padding: 14px; resize: none; line-height: 1.6; min-height: 96px; }
    .cfg-inp { font-size: 13px; padding: 12px 14px; }

    .al {
      margin-top: 12px;
      font-size: 10px;
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid;
      line-height: 1.4;
    }
    .ctaw { padding: 20px; }
    .cta {
      width: 100%;
      padding: 16px;
      background: var(--text);
      color: var(--bg);
      border: none;
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 3px;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 10px;
      display: block;
      margin-top: 8px;
      transition: opacity .12s;
    }
    .cta:disabled { opacity: .25; cursor: not-allowed; }
    .cta-sec { background: #111822; color: var(--text); border: 1px solid var(--border); }
    .cta-danger { background: rgba(255,77,109,.1); color: #ffd0dc; border: 1px solid rgba(255,77,109,.3); }
    .cta-soft { background: rgba(91,154,255,.1); color: #d9e9ff; border: 1px solid rgba(91,154,255,.3); }

    .err {
      margin-top: 12px;
      background: rgba(255,77,109,.1);
      color: #ffd0dc;
      border: 1px solid rgba(255,77,109,.3);
      padding: 10px 12px;
      border-radius: 10px;
      font-size: 11px;
      line-height: 1.5;
    }
    .ok {
      margin-top: 12px;
      background: rgba(46,204,113,.1);
      color: #ccf9de;
      border: 1px solid rgba(46,204,113,.3);
      padding: 10px 12px;
      border-radius: 10px;
      font-size: 11px;
      line-height: 1.5;
    }
    .info {
      margin-top: 12px;
      background: rgba(91,154,255,.1);
      color: #d9e9ff;
      border: 1px solid rgba(91,154,255,.3);
      padding: 10px 12px;
      border-radius: 10px;
      font-size: 11px;
      line-height: 1.5;
    }

    .section { padding: 20px; border-bottom: 1px solid var(--border); }
    .section-lbl { font-size: 9px; letter-spacing: 3px; color: var(--muted); text-transform: uppercase; margin-bottom: 14px; }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .mini { background: #111822; border: 1px solid var(--border); border-radius: 10px; padding: 12px; }
    .mini-k { font-size: 8px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; margin-bottom: 5px; }
    .mini-v { font-size: 13px; font-weight: 600; line-height: 1.4; }

    .feu-badge { display: flex; align-items: center; gap: 14px; padding: 16px 18px; border-radius: 10px; border: 1px solid; margin-bottom: 12px; }
    .feu-dot { width: 10px; height: 10px; border-radius: 50%; animation: blink 2s infinite; flex-shrink: 0; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
    .feu-main { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; }
    .feu-sub { font-size: 10px; color: var(--muted); margin-top: 2px; }

    .pill-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
    .pill {
      padding: 5px 10px;
      border-radius: 999px;
      background: #111822;
      border: 1px solid var(--border);
      font-size: 10px;
      color: var(--muted);
    }

    .future-item { padding: 14px 0; border-bottom: 1px solid #1a2230; }
    .future-item:last-child { border-bottom: none; }
    .future-type { font-size: 8px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; margin-bottom: 6px; }
    .future-text { font-size: 13px; line-height: 1.7; white-space: pre-wrap; }

    .stats-row { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; }
    .stat-block {
      flex-shrink: 0;
      background: #111822;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      min-width: 130px;
    }
    .stat-title { font-size: 8px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; }
    .stat-row { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 4px; gap: 10px; }
    .stat-row span:first-child { color: var(--muted); }

    .hist-item { padding: 12px 0; border-bottom: 1px solid #1a2230; }
    .hist-item:last-child { border-bottom: none; }
    .hist-date { font-size: 10px; color: var(--muted); margin-bottom: 4px; }
    .hist-main { font-size: 12px; margin-bottom: 4px; }
    .hist-sub { font-size: 11px; color: var(--muted); line-height: 1.5; }

    .cfg { padding: 24px 20px; }
    .cfg-title { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700; margin-bottom: 6px; }
    .cfg-sub { font-size: 11px; color: var(--muted); margin-bottom: 20px; line-height: 1.5; }
    .cfg-field { margin-bottom: 16px; }
    .cfg-lbl { font-size: 9px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; }
    .cfg-sep { border: none; border-top: 1px solid var(--border); margin: 20px 0; }
    .cfg-info { font-size: 11px; color: var(--muted); line-height: 1.8; }
    .codebox {
      background: #111822;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      font-size: 11px;
      line-height: 1.6;
      color: var(--text);
      white-space: pre-wrap;
    }

    .nav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 430px;
      background: var(--bg);
      border-top: 1px solid var(--border);
      display: flex;
      z-index: 20;
    }
    .nb {
      flex: 1;
      padding: 12px 8px;
      background: none;
      border: none;
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
      font-size: 8px;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
    }
    .nb.on { color: var(--text); }
    .nb-icon { font-size: 15px; }
  </style>

  <meta name="application-name" content="ASICS" />
  <meta name="apple-mobile-web-app-title" content="ASICS" />
  <meta name="description" content="ASICS V14 PWA — export RUN, analyse GPT, import RESULT, feu tricolore." />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />

</head>
<body>
<div class="app" id="app"></div>

<script>
  const APP_VERSION = "13.0.0";
  const RULESET_VERSION = "asics-v13-fire-import";
  const STORAGE_KEYS = {
    journal: "asics_v13_journal",
    prompt: "asics_v13_prompt"
  };
  const MAX_OPEN_CHARS = 800;

  const OPEN_QUESTIONS = [
    "Qu'est-ce qui veut avancer aujourd'hui ?",
    "Qu'est-ce qui demande un peu d'espace ?",
    "Qu'est-ce qui résiste encore ?",
    "Qu'est-ce qui pourrait devenir plus simple aujourd'hui ?",
    "Qu'est-ce qui te tire vers l'avant aujourd'hui ?"
  ];

  const SPORT_TYPES = [
    { id: "marche", label: "Marche" },
    { id: "course_natation", label: "Course / natation" },
    { id: "sport_salle", label: "Sport collectif / salle" },
    { id: "boxe_muay_thai", label: "Boxe / Muay Thai" },
    { id: "rpm_velo", label: "RPM / vélo" },
    { id: "mobilite", label: "Mobilité" },
    { id: "autre", label: "Autre" }
  ];

  const SPORT_DURATIONS = [
    { id: 1, label: "45–59 min" },
    { id: 2, label: "60–89 min" },
    { id: 3, label: "90 min ou +" }
  ];

  const DEFAULT_PROMPT = `Analyse ce fichier ASICS avec le prompt canonique ASICS V13. Retourne uniquement un fichier ASICS_RESULT.json strict, téléchargeable, sans texte hors JSON. Le run_id doit être dérivé de import_contract.expected_run_id. Le résultat doit inclure feu_de_synthese sous forme d'objet avec code, label, couleur et sous_texte.`;

  const state = {
    view: "run",
    step: 0,
    flow: [],
    sleepHours: null,
    ateAtNight: null,
    hungerIntensity: null,
    hungerControl: null,
    hungerAppeasement: null,
    didSport: null,
    sportType: null,
    sportDuration: null,
    loops: null,
    anchor: null,
    weight: null,
    open1: "",
    open2: "",
    currentQuestion: "",
    signals: {},
    cockpit: {},
    synthesisFire: "",
    trajectory: "",
    pendingRunExport: null,
    analysisResult: null,
    runId: "",
    importedForRunId: "",
    importedFire: null,
    gestureUser: "",
    gestureType: "",
    error: "",
    info: ""
  };

  const app = document.getElementById("app");

  function isSunday() { return new Date().getDay() === 0; }
  function todayLabel() {
    return new Date().toLocaleDateString("fr-FR", {
      weekday: "short",
      day: "numeric",
      month: "short"
    });
  }

  function err(msg) { state.error = msg || ""; }
  function info(msg) { state.info = msg || ""; }
  function clearMsg() { state.error = ""; state.info = ""; }

  function renderMsg() {
    const parts = [];
    if (state.info) parts.push(`<div class="ok">${esc(state.info)}</div>`);
    if (state.error) parts.push(`<div class="err">${esc(state.error)}</div>`);
    return parts.join("");
  }

  function buildFlow() {
    const flow = ["sleep", "night"];
    if (state.ateAtNight === true) flow.push("hungerI", "hungerC", "hungerA");
    flow.push("sport");
    if (state.didSport === true) flow.push("sportType", "sportDuration");
    flow.push("loops", "anchor");
    if (isSunday()) flow.push("weight");
    flow.push("open1");
    if (state.open1 && countWords(state.open1) <= 3) flow.push("open2");
    flow.push("prepareExport", "awaitImport");
    state.flow = flow;
    return flow;
  }

  function getCurrentStepKey() {
    const flow = buildFlow();
    return flow[state.step] || "awaitImport";
  }

  function stepIndexLabel() {
    const key = getCurrentStepKey();
    const flow = buildFlow().filter(k => !["prepareExport", "awaitImport"].includes(k));
    const visualIndex = Math.max(1, flow.indexOf(key) + 1);
    return `Q${visualIndex} / ${flow.length}`;
  }

  function render(content) {
    app.innerHTML = `
      <div class="hdr">
        <div class="hdr-t">ASICS</div>
        <div class="hdr-v">V13</div>
        <div class="mode-badge mode-export">EXPORT / IMPORT</div>
        <div class="hdr-d">${todayLabel()}</div>
      </div>
      ${content}
      ${renderNav()}
    `;
  }

  function renderNav() {
    const v = state.view;
    const runOn = v === "run" || v === "result";
    return `
      <div class="nav">
        <button class="nb ${runOn ? "on" : ""}" onclick="navTo('run')"><span class="nb-icon">◎</span>RUN</button>
        <button class="nb ${v === "hist" ? "on" : ""}" onclick="navTo('hist')"><span class="nb-icon">▤</span>LOG</button>
        <button class="nb ${v === "cfg" ? "on" : ""}" onclick="navTo('cfg')"><span class="nb-icon">⇅</span>FLOW</button>
      </div>
    `;
  }

  function navTo(v) {
    if (v === "run") state.view = state.analysisResult ? "result" : "run";
    else state.view = v;
    dispatch();
  }

  function dispatch() {
    switch (state.view) {
      case "run": return renderRun();
      case "result": return renderResult();
      case "hist": return renderHist();
      case "cfg": return renderCfg();
      default: return renderRun();
    }
  }

  function next() {
    state.step += 1;
    renderRun();
  }

  function prev() {
    state.step = Math.max(0, state.step - 1);
    renderRun();
  }

  function qWrap(title, inner, backAction = "prev()", nextHtml = "") {
    render(`
      <div class="qscreen">
        <div class="qlabel">${stepIndexLabel()}</div>
        <div class="qtitle">${title}</div>
        ${inner}
        ${renderMsg()}
      </div>
      <div class="ctaw">
        ${state.step > 0 ? `<button class="cta cta-sec" onclick="${backAction}">← Retour</button>` : ""}
        ${nextHtml}
      </div>
    `);
  }

  function renderRun() {
    state.view = "run";
    const key = getCurrentStepKey();
    switch (key) {
      case "sleep": return qSleep();
      case "night": return qNight();
      case "hungerI": return qHungerI();
      case "hungerC": return qHungerC();
      case "hungerA": return qHungerA();
      case "sport": return qSport();
      case "sportType": return qSportType();
      case "sportDuration": return qSportDuration();
      case "loops": return qLoops();
      case "anchor": return qAnchor();
      case "weight": return qWeight();
      case "open1": return qOpen1();
      case "open2": return qOpen2();
      case "prepareExport": return renderPrepareExport();
      case "awaitImport": return renderAwaitImport();
      default: return renderAwaitImport();
    }
  }

  function qSleep() {
    qWrap(
      "Combien d'heures as-tu dormi ?",
      `<input class="num-inp" id="slp" type="number" step="0.5" min="0" max="24" placeholder="7.5" value="${state.sleepHours ?? ""}" />`,
      "prev()",
      `<button class="cta" onclick="saveSleep()">Suivant →</button>`
    );
    document.getElementById("slp")?.addEventListener("input", e => {
      state.sleepHours = parseFloat(e.target.value) || null;
    });
  }

  function saveSleep() {
    clearMsg();
    const v = parseFloat(document.getElementById("slp")?.value);
    if (Number.isNaN(v) || v < 0 || v > 24) {
      err("Valeur invalide.");
      return qSleep();
    }
    state.sleepHours = v;
    next();
  }

  function qNight() {
    qWrap(
      "As-tu mangé cette nuit ?",
      `<div class="btn-row">
        <button class="btn-choice ${state.ateAtNight === false ? "sel" : ""}" onclick="saveNight(false)">Non</button>
        <button class="btn-choice ${state.ateAtNight === true ? "sel-o" : ""}" onclick="saveNight(true)">Oui</button>
      </div>`
    );
  }

  function saveNight(v) {
    clearMsg();
    state.ateAtNight = v;
    if (!v) {
      state.hungerIntensity = 0;
      state.hungerControl = 0;
      state.hungerAppeasement = 0;
    }
    next();
  }

  function qHungerI() {
    qWrap(
      "Intensité de la faim cette nuit",
      `<div class="qhint">0 = nulle — 3 = forte</div>
       <div class="scale-row" style="margin-top:16px">
         ${[0,1,2,3].map(n => `<button class="scale-btn ${state.hungerIntensity === n ? "sel" : ""}" onclick="state.hungerIntensity=${n};qHungerI()">${n}</button>`).join("")}
       </div>`,
      "prev()",
      `<button class="cta" onclick="saveSimpleField('hungerIntensity','qHungerI')" ${state.hungerIntensity === null ? "disabled" : ""}>Suivant →</button>`
    );
  }

  function qHungerC() {
    qWrap(
      "Contrôle sur la prise alimentaire",
      `<div class="qhint">0 = total — 3 = aucun</div>
       <div class="scale-row" style="margin-top:16px">
         ${[0,1,2,3].map(n => `<button class="scale-btn ${state.hungerControl === n ? "sel" : ""}" onclick="state.hungerControl=${n};qHungerC()">${n}</button>`).join("")}
       </div>`,
      "prev()",
      `<button class="cta" onclick="saveSimpleField('hungerControl','qHungerC')" ${state.hungerControl === null ? "disabled" : ""}>Suivant →</button>`
    );
  }

  function qHungerA() {
    qWrap(
      "Niveau d'apaisement après la prise",
      `<div class="qhint">0 = aucun — 3 = complet</div>
       <div class="scale-row" style="margin-top:16px">
         ${[0,1,2,3].map(n => `<button class="scale-btn ${state.hungerAppeasement === n ? "sel" : ""}" onclick="state.hungerAppeasement=${n};qHungerA()">${n}</button>`).join("")}
       </div>`,
      "prev()",
      `<button class="cta" onclick="saveSimpleField('hungerAppeasement','qHungerA')" ${state.hungerAppeasement === null ? "disabled" : ""}>Suivant →</button>`
    );
  }

  function saveSimpleField(field, rerenderName) {
    clearMsg();
    if (state[field] === null || state[field] === undefined) {
      err("Choisis une valeur.");
      return window[rerenderName]();
    }
    next();
  }

  function qSport() {
    qWrap(
      "As-tu fait une activité physique de 45 min ou plus hier ?",
      `<div class="btn-row">
        <button class="btn-choice ${state.didSport === false ? "sel" : ""}" onclick="saveSport(false)">Non</button>
        <button class="btn-choice ${state.didSport === true ? "sel" : ""}" onclick="saveSport(true)">Oui</button>
      </div>`
    );
  }

  function saveSport(v) {
    clearMsg();
    state.didSport = v;
    if (!v) {

  function computeSignalsAndExport() {
    const j = getJournal();
    const recent = j.slice(-30);

    const sleepStatus = state.sleepHours >= 8 ? "green" : state.sleepHours >= 7 ? "orange" : "red";
    const hungerStress = state.ateAtNight
      ? (Number(state.hungerIntensity || 0) + Number(state.hungerControl || 0))
      : 0;
    const hungerStatus = !state.ateAtNight ? "green" : hungerStress >= 4 ? "red" : "orange";
    const loopStatus = state.loops === 0 ? "green" : state.loops === 1 ? "orange" : "red";
    const anchorStatus = state.anchor ? "green" : "orange";

    let apLevel = 0;
    if (state.didSport) apLevel = Number(state.sportDuration || 1);

    const prevAnchors = j.slice(-3).map(e => e.anchor);
    const latentAnchor = !state.anchor && prevAnchors.filter(v => v === false).length >= 2;

    const physCap =
      sleepStatus === "green" && loopStatus === "green" && !state.ateAtNight
        ? "HIGH"
        : sleepStatus === "red" || loopStatus === "red" || hungerStatus === "red"
          ? "LOW"
          : "MEDIUM";

    const intTension =
      loopStatus === "red" || hungerStatus === "red"
        ? "HIGH"
        : loopStatus === "orange" || hungerStatus === "orange" || latentAnchor
          ? "MEDIUM"
          : "LOW";

    const realExposure =
      physCap === "LOW" && intTension === "HIGH"
        ? "HIGH"
        : physCap === "HIGH" && intTension === "LOW"
          ? "LOW"
          : "MEDIUM";

    const synthesisFire =
      sleepStatus === "red" || loopStatus === "red" || hungerStatus === "red"
        ? "RED"
        : sleepStatus === "orange" || loopStatus === "orange" || hungerStatus === "orange"
          ? "ORANGE"
          : "GREEN";

    const last7 = recent.slice(-6).map(e => e.synthesisFire).concat(synthesisFire);
    const redCnt = last7.filter(v => v === "RED").length;
    const orCnt = last7.filter(v => v === "ORANGE").length;
    const trajectory =
      redCnt >= 2
        ? "ENFERMEMENT SILENCIEUX"
        : redCnt >= 1 || orCnt >= 4
          ? "SOUS TENSION"
          : "STABLE";

    state.signals = {
      sleepStatus,
      hungerStress,
      hungerStatus,
      apLevel,
      loopStatus,
      anchorStatus,
      latentAnchor,
      noStructuringDecision: state.loops === 2
    };
    state.cockpit = { physCap, intTension, realExposure };
    state.synthesisFire = synthesisFire;
    state.trajectory = trajectory;

    const runId = buildRunId();
    state.runId = runId;

    const runExport = {
      type: "asics_run_export",
      app_version: APP_VERSION,
      ruleset_version: RULESET_VERSION,
      exported_at: new Date().toISOString(),
      run_id: runId,
      date: new Date().toISOString().slice(0,10),
      inputs: {
        sleepHours: state.sleepHours,
        ateAtNight: state.ateAtNight,
        hungerIntensity: state.hungerIntensity,
        hungerControl: state.hungerControl,
        hungerAppeasement: state.hungerAppeasement,
        didSport: state.didSport,
        sportType: state.sportType,
        sportDuration: state.sportDuration,
        loops: state.loops,
        anchor: state.anchor,
        weight: state.weight,
        currentQuestion: state.currentQuestion,
        open1: state.open1,
        open2: state.open2
      },
      signals: state.signals,
      cockpit: state.cockpit,
      synthesisFire: state.synthesisFire,
      trajectory: state.trajectory,
      history: getHistoryForExport(7),
      import_contract: {
        expected_result_type: "asics_analysis_result",
        expected_run_id: runId,
        target_app: "ASICS V13 HTML"
      }
    };

    state.pendingRunExport = runExport;
  }

  async function handleResultImport(event) {
    clearMsg();
    const file = event.target.files?.[0];
    if (!file) return;

    try {
      const text = await file.text();
      const parsed = JSON.parse(text);
      validateResultFile(parsed);

      const expectedRunId = state.pendingRunExport?.import_contract?.expected_run_id || state.pendingRunExport?.run_id || state.runId;
      if (parsed.run_id !== expectedRunId) {
        throw new Error(`run_id non correspondant. Attendu : ${expectedRunId}`);
      }

      state.analysisResult = parsed;
      state.importedForRunId = parsed.run_id;
      state.importedFire = normalizeImportedFire(parsed.analysis?.feu_de_synthese, state.synthesisFire);
      state.gestureUser = parsed.analysis?.geste_du_jour || "";
      saveJournalWithAnalysis();
      info("Analyse importée avec succès.");
      state.view = "result";
      renderResult();
    } catch (e) {
      err(`Import impossible — ${normalizeError(e)}`);
      renderAwaitImport();
    } finally {
      if (event.target) event.target.value = "";
    }
  }

  function normalizeImportedFire(fire, fallbackCode) {
    const codeToMeta = (code) => {
      const c = String(code || fallbackCode || "ORANGE").toUpperCase();
      if (c === "GREEN" || c === "VERT") return { code: "GREEN", label: "AVANCE", couleur: "green", sous_texte: "Porteur opérationnel" };
      if (c === "RED" || c === "ROUGE") return { code: "RED", label: "STOP", couleur: "red", sous_texte: "Porteur indisponible" };
      return { code: "ORANGE", label: "RALENTIS", couleur: "orange", sous_texte: "Lecture prudente" };
    };
    if (typeof fire === "string") return codeToMeta(fire);
    if (fire && typeof fire === "object") {
      const base = codeToMeta(fire.code || fire.label || fallbackCode);
      return {
        code: base.code,
        label: typeof fire.label === "string" && fire.label.trim() ? fire.label.trim() : base.label,
        couleur: typeof fire.couleur === "string" && fire.couleur.trim() ? fire.couleur.trim().toLowerCase() : base.couleur,
        sous_texte: typeof fire.sous_texte === "string" && fire.sous_texte.trim() ? fire.sous_texte.trim() : base.sous_texte
      };
    }
    return codeToMeta(fallbackCode || "ORANGE");
  }

  function fireColorValue(fireObj) {
    const c = (fireObj?.couleur || "").toLowerCase();
    if (c === "green" || c === "vert") return "var(--green)";
    if (c === "red" || c === "rouge") return "var(--red)";
    return "var(--orange)";
  }

  function stats(j, days) {
    const sl = j.slice(-days);
    if (!sl.length) return { g:0, o:0, r:0, sleep:"-", night:0, sport:0, loops2:0, noAnch:0 };
    const sleeps = sl.map(e => Number(e.sleepHours)).filter(v => !Number.isNaN(v));
    const avg = sleeps.length ? (sleeps.reduce((a,b)=>a+b,0)/sleeps.length).toFixed(1) + "h" : "-";
    return {
      g: sl.filter(e => e.synthesisFire === "GREEN").length,
      o: sl.filter(e => e.synthesisFire === "ORANGE").length,
      r: sl.filter(e => e.synthesisFire === "RED").length,
      sleep: avg,
      night: sl.filter(e => e.ateAtNight === true).length,
      sport: sl.filter(e => e.didSport === true).length,
      loops2: sl.filter(e => e.loops === 2).length,
      noAnch: sl.filter(e => e.anchor === false).length
    };
  }

          <button class="cta cta-soft" onclick="copyPromptText()">Copier le prompt</button>
        </div>

        <hr class="cfg-sep" />
        <div class="cfg-lbl">Contrat d'import</div>
        <div class="cfg-info">
          <div>Type attendu : <span style="color:var(--text)">asics_analysis_result</span></div>
          <div>Contenu attendu : <span style="color:var(--text)">feu_de_synthese + lecture_froide + carte_des_futurs + geste_du_jour</span></div>
          <div>Vérification : <span style="color:var(--text)">run_id = import_contract.expected_run_id</span></div>
        </div>
        ${renderMsg()}
      </div>
    `);
  }

  function savePromptText() {
    clearMsg();
    const value = document.getElementById("promptInput")?.value || DEFAULT_PROMPT;
    localStorage.setItem(STORAGE_KEYS.prompt, value.trim() || DEFAULT_PROMPT);
    info("Prompt enregistré.");
    renderCfg();
  }

  function getPromptText() {
    return localStorage.getItem(STORAGE_KEYS.prompt) || DEFAULT_PROMPT;
  }

  async function copyPromptText() {
    clearMsg();
    try {
      await navigator.clipboard.writeText(getPromptText());
      info("Prompt copié.");
    } catch {
      info("Copie non disponible. Sélectionne le texte manuellement.");
    }
    dispatch();
  }

  function buildRunId() {
    const d = new Date();
    const pad = n => String(n).padStart(2, "0");
    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}_${pad(d.getHours())}-${pad(d.getMinutes())}-${pad(d.getSeconds())}`;
  }

  function getHistoryForExport(days = 7) {
    return getJournal().slice(-days).map(entry => ({
      date: entry.date,
      run_id: entry.run_id,
      synthesisFire: entry.synthesisFire,
      trajectory: entry.trajectory,
      sleepHours: entry.sleepHours,
      ateAtNight: entry.ateAtNight,
      didSport: entry.didSport,
      loops: entry.loops,
      anchor: entry.anchor,
      open1: entry.open1,
      open2: entry.open2,
      analysisImported: Boolean(entry.analysis)
    }));
  }

  function downloadRunExport() {
    clearMsg();
    if (!state.pendingRunExport) {
      err("Aucun fichier RUN prêt.");
      return dispatch();
    }
    downloadJson(`asics_run_${state.pendingRunExport.run_id}.json`, state.pendingRunExport);
    info("RUN exporté.");
    dispatch();
  }

  function downloadResultTemplate() {
    if (!state.analysisResult) return;
    downloadJson(`asics_result_${state.analysisResult.run_id}.json`, state.analysisResult);
  }

  function downloadJson(filename, data) {
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  }

  function saveJournalWithAnalysis() {
    const journal = getJournal();
    const entry = {
      date: new Date().toISOString(),
      run_id: state.runId,
      sleepHours: state.sleepHours,
      ateAtNight: state.ateAtNight,
      hungerIntensity: state.hungerIntensity,
      hungerControl: state.hungerControl,
      hungerAppeasement: state.hungerAppeasement,
      didSport: state.didSport,
      sportType: state.sportType,
      sportDuration: state.sportDuration,
      loops: state.loops,
      anchor: state.anchor,
      weight: state.weight,
      currentQuestion: state.currentQuestion,
      open1: state.open1,
      open2: state.open2,
      signals: state.signals,
      cockpit: state.cockpit,
      synthesisFire: state.synthesisFire,
      trajectory: state.trajectory,
      exportedRun: state.pendingRunExport,
      analysis: state.analysisResult,
      importedFire: state.importedFire,
      gestureUser: state.gestureUser,
      gestureType: state.gestureType
    };

    const idx = journal.findIndex(e => e.run_id === state.runId);
    if (idx >= 0) journal[idx] = { ...journal[idx], ...entry };
    else journal.push(entry);

    localStorage.setItem(STORAGE_KEYS.journal, JSON.stringify(journal));
  }

  function getJournal() {
    try {
      const raw = JSON.parse(localStorage.getItem(STORAGE_KEYS.journal) || "[]");
      return Array.isArray(raw) ? raw : [];
    } catch {
      return [];
    }
  }

  function validateResultFile(d) {
    if (!d || typeof d !== "object") throw new Error("fichier invalide");
    if (d.type !== "asics_analysis_result") throw new Error("type invalide");
    if (typeof d.run_id !== "string" || !d.run_id.trim()) throw new Error("run_id manquant");

    const a = d.analysis;
    if (!a || typeof a !== "object") throw new Error("analysis manquant");
    if (a.feu_de_synthese === undefined || a.feu_de_synthese === null) throw new Error("feu_de_synthese manquant");

    const lf = a.lecture_froide;
    if (!lf || typeof lf !== "object") throw new Error("lecture_froide manquant");
    for (const k of ["tension_dominante", "pente", "risque", "signal_faible"]) {
      if (typeof lf[k] !== "string") throw new Error(`lecture_froide.${k} manquant`);
    }

    const cf = a.carte_des_futurs;
    if (!cf || typeof cf !== "object") throw new Error("carte_des_futurs manquant");
    for (const k of ["continuite", "bifurcation", "enfermement"]) {
      if (typeof cf[k] !== "string") throw new Error(`carte_des_futurs.${k} manquant`);
    }

    if (typeof a.geste_du_jour !== "string") throw new Error("geste_du_jour manquant");
  }

  function countWords(t) { return t.trim().split(/\s+/).filter(Boolean).length; }
  function trunc(t, n) { return String(t).length > n ? String(t).slice(0, n - 1) + "…" : String(t); }
  function fmtDate(iso) { try { return new Date(iso).toLocaleString("fr-FR"); } catch { return iso; } }
  function durationLabel(v) {
    const found = SPORT_DURATIONS.find(x => x.id === Number(v));
    return found ? found.label : "45+ min";
  }
  function sanitizeOpenText(s) {
    return String(s || "")
      .replace(/\u0000/g, "")
      .replace(/\s+/g, " ")
      .trim()
      .slice(0, MAX_OPEN_CHARS);
  }
  function normalizeError(e) {
    const m = String(e?.message || "erreur inconnue");
    return m.length <= 140 ? m : m.slice(0, 137) + "…";
  }
  function esc(s) {
    return String(s ?? "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }

  dispatch();
</script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function () {
    navigator.serviceWorker.register('./sw.js').catch(function (err) {
      console.log('SW registration failed:', err);
    });
  });
}
</script>
